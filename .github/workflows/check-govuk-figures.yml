name: Check GOV.UK Figures
on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          cache: "pnpm"
      - run: pnpm install

      - name: Install Playwright Chromium
        run: pnpx playwright install --with-deps chromium

      - name: Scrape GOV.UK figures
        id: scrape
        continue-on-error: true
        run: pnpm check:govuk

      - name: Compare and update files
        id: update
        if: steps.scrape.outcome == 'success'
        run: pnpx tsx scripts/check-govuk-figures/update-files.ts

      - name: Parse check result
        id: result
        if: always()
        run: |
          if [ -f scripts/check-govuk-figures/results/check-result.json ]; then
            STATUS=$(jq -r '.status' scripts/check-govuk-figures/results/check-result.json)
            echo "status=$STATUS" >> $GITHUB_OUTPUT
          elif [ "${{ steps.scrape.outcome }}" == "failure" ]; then
            echo "status=scrape-error" >> $GITHUB_OUTPUT
          else
            echo "status=unknown" >> $GITHUB_OUTPUT
          fi

      - name: Format updated files
        if: steps.result.outputs.status == 'mismatch'
        run: pnpm format

      - name: Verify build with updated files
        id: verify
        if: steps.result.outputs.status == 'mismatch'
        run: pnpm lint && pnpm typecheck && pnpm test --run && pnpm build

      - name: Create Pull Request
        if: steps.result.outputs.status == 'mismatch' && steps.verify.outcome == 'success'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: auto/update-govuk-figures
          delete-branch: true
          title: "chore: update student loan figures from GOV.UK"
          body: |
            ## Summary

            The daily GOV.UK figure checker detected updated student loan figures.
            See the check result artifact for details on what changed.

            ## Review checklist
            - [ ] Verify threshold values look correct against [GOV.UK](https://www.gov.uk/repaying-your-student-loan/what-you-pay)
            - [ ] Verify write-off periods against [GOV.UK](https://www.gov.uk/repaying-your-student-loan/when-your-student-loan-gets-written-off-or-cancelled)
            - [ ] Check if `src/lib/loans/plans.ts` CURRENT_RATES period comments need updating
            - [ ] Verify `public/llms.txt` figures are accurate

            > Auto-generated by the GOV.UK figure freshness checker
          labels: |
            govuk-figures-changed
          commit-message: "chore: update student loan figures from GOV.UK"

      - name: Create issue on scrape error
        if: steps.result.outputs.status == 'scrape-error' || steps.result.outputs.status == 'unknown'
        uses: actions/github-script@v7
        with:
          script: |
            const title = 'GOV.UK scraping failed';
            const label = 'govuk-scrape-error';
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: label,
              state: 'open',
            });
            const body = `The daily GOV.UK figure checker failed to scrape data.\n\nWorkflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\nPlease check if the GOV.UK page structure has changed.`;
            if (issues.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues[0].number,
                body: body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: [label],
              });
            }

      - name: Create issue on verification failure
        if: steps.result.outputs.status == 'mismatch' && steps.verify.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const title = 'GOV.UK figures changed but verification failed';
            const label = 'govuk-figures-changed';
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: label,
              state: 'open',
            });
            const body = `The daily checker detected changed figures on GOV.UK, but the updated files failed verification (lint/typecheck/test/build).\n\nWorkflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\nManual intervention required.`;
            if (issues.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues[0].number,
                body: body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: [label],
              });
            }

      - name: Close stale issues
        if: steps.result.outputs.status == 'ok'
        uses: actions/github-script@v7
        with:
          script: |
            for (const label of ['govuk-scrape-error', 'govuk-figures-changed']) {
              const { data: issues } = await github.rest.issues.listForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                labels: label,
                state: 'open',
              });
              for (const issue of issues) {
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  state: 'closed',
                  state_reason: 'completed',
                });
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  body: 'Auto-closed: GOV.UK figures now match the codebase.',
                });
              }
            }

      - name: Upload check report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: govuk-check-report
          path: scripts/check-govuk-figures/results/
          retention-days: 7
