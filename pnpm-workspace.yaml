# pnpm 11 no longer reads the `pnpm` field in package.json — settings live here.
# https://pnpm.io/settings
overrides:
  react-is: ^19.2.4
  rollup: ^4.59.0
  picomatch: ^4.0.4
  flatted: ^3.4.2
  yaml: ^2.8.3
  brace-expansion: ^5.0.5
  # Transitive-dep security patches (Dependabot alerts). All pulled indirectly;
  # forced up to the first patched release for each advisory.
  lodash: ^4.18.1
  undici: ^7.28.0
  postcss: ^8.5.16
# These postinstall build scripts stay disabled (they were ignored under pnpm
# 10 and the app builds fine without them); pnpm 11 requires an explicit choice.
allowBuilds:
  "@parcel/watcher": false
  esbuild: false
  msw: false
  sharp: false
